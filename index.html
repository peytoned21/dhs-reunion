<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DHS Class of 2006 — 20th Reunion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #1a1a4e;
    --navy-mid:   #252566;
    --navy-light: #2e2e80;
    --gold:       #c9982a;
    --gold-light: #e8c96a;
    --gold-faint: #f5ead0;
    --gold-pale:  #fdf8ee;
    --warm-bg:    #1e1508;
    --cream:      #f7f0e0;
    --ink:        #1a1206;
    --ink-mid:    #4a3f28;
    --ink-light:  #9a8a6a;
    --white:      #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-bg);
    color: var(--cream);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    text-align: center;
    padding: 3rem 1.5rem 2.5rem;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 30%, #3a2a08 0%, #1e1508 55%, #0e0a04 100%);
  }

  /* confetti streaks */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(35deg, transparent, transparent 60px, rgba(201,152,42,0.04) 60px, rgba(201,152,42,0.04) 61px),
      repeating-linear-gradient(-40deg, transparent, transparent 80px, rgba(201,152,42,0.03) 80px, rgba(201,152,42,0.03) 81px);
    pointer-events: none;
  }

  .script-line {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    opacity: 0.9;
  }

  .hero-number {
    font-family: 'Cinzel', serif;
    font-size: clamp(80px, 18vw, 130px);
    font-weight: 600;
    line-height: 0.85;
    color: var(--navy-light);
    text-shadow:
      0 0 40px rgba(42, 42, 160, 0.6),
      0 2px 0 rgba(201,152,42,0.4);
    position: relative;
    margin-bottom: 0.25rem;
  }

  .hero-class {
    position: absolute;
    top: -0.15em;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 4vw, 26px);
    font-weight: 400;
    color: var(--gold-light);
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .hero-reunion {
    font-family: 'Cinzel', serif;
    font-size: clamp(13px, 2.5vw, 17px);
    font-weight: 600;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .gold-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 auto 1.25rem;
    max-width: 320px;
  }
  .gold-rule-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-light), transparent); }
  .gold-rule-diamond { width: 5px; height: 5px; background: var(--gold-light); transform: rotate(45deg); flex-shrink: 0; }

  .hero-details {
    font-size: 14px;
    font-weight: 500;
    color: var(--navy-light);
    background: var(--gold);
    display: inline-block;
    padding: 6px 20px;
    border-radius: 2px;
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
    font-family: 'Cinzel', serif;
    font-size: 12px;
  }

  .hero-venue {
    font-size: 12px;
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    opacity: 0.8;
  }

  /* ── STATS ── */
  .stats-bar {
    background: var(--navy);
    display: flex;
    border-top: 1px solid rgba(201,152,42,0.3);
    border-bottom: 1px solid rgba(201,152,42,0.3);
  }

  .stat {
    flex: 1;
    padding: 1rem 0;
    text-align: center;
    border-right: 1px solid rgba(201,152,42,0.15);
  }
  .stat:last-child { border-right: none; }

  .stat-n {
    font-family: 'Cinzel', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--gold-light);
    line-height: 1;
  }

  .stat-l {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(201,152,42,0.55);
    margin-top: 4px;
  }

  /* ── BODY ── */
  .body {
    max-width: 600px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 4rem;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 0.75rem;
  }

  .search {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid rgba(201,152,42,0.3);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    background: rgba(255,255,255,0.05);
    color: var(--cream);
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--gold); }
  .search::placeholder { color: rgba(201,152,42,0.4); }

  .refresh {
    padding: 10px 14px;
    border: 1px solid rgba(201,152,42,0.3);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: transparent;
    color: rgba(201,152,42,0.6);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .refresh:hover { background: rgba(201,152,42,0.1); border-color: var(--gold); color: var(--gold); }

  .legend {
    display: flex;
    gap: 14px;
    justify-content: flex-end;
    margin-bottom: 0.75rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: rgba(201,152,42,0.5);
    letter-spacing: 0.05em;
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-paid   { background: var(--gold); }
  .dot-unpaid { background: transparent; border: 1px solid rgba(201,152,42,0.35); }

  /* ── LIST ── */
  .list { display: flex; flex-direction: column; }

  .entry {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(201,152,42,0.1);
    gap: 12px;
    opacity: 0;
    animation: fadeIn 0.22s forwards;
    transition: background 0.1s;
    border-radius: 0;
  }
  .entry:first-child {
    border-top: 1px solid rgba(201,152,42,0.1);
  }
  .entry:hover { background: rgba(201,152,42,0.04); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .entry-num {
    font-size: 11px;
    min-width: 20px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .entry-body { flex: 1; min-width: 0; }

  .entry-name {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.3;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 400;
  }

  .entry-guest {
    font-size: 12px;
    font-weight: 300;
    font-style: italic;
    margin-top: 2px;
  }

  .entry-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* paid */
  .paid .entry-num   { color: rgba(201,152,42,0.4); }
  .paid .entry-name  { color: var(--cream); }
  .paid .entry-guest { color: rgba(247,240,224,0.55); }
  .paid .entry-dot   { background: var(--gold); }

  /* unpaid */
  .unpaid .entry-num   { color: rgba(201,152,42,0.2); }
  .unpaid .entry-name  { color: rgba(247,240,224,0.35); }
  .unpaid .entry-guest { color: rgba(247,240,224,0.22); }
  .unpaid .entry-dot   { background: transparent; border: 1px solid rgba(201,152,42,0.25); }

  .empty {
    text-align: center;
    padding: 3rem 0;
    color: rgba(201,152,42,0.4);
    font-size: 14px;
    font-weight: 300;
  }

  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 11px;
    color: rgba(201,152,42,0.35);
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .footer a { color: var(--gold); text-decoration: none; cursor: pointer; opacity: 0.7; }
  .footer a:hover { opacity: 1; }
</style>
</head>
<body>

<div class="hero">
  <div class="script-line">Dunwoody High School</div>

  <div style="position:relative; display:inline-block; margin-bottom: 0.25rem;">
    <div class="hero-class">Class of</div>
    <div class="hero-number">06</div>
  </div>

  <div class="hero-reunion">20 Year Reunion</div>

  <div class="gold-rule">
    <div class="gold-rule-line"></div>
    <div class="gold-rule-diamond"></div>
    <div class="gold-rule-line"></div>
  </div>

  <div class="hero-details">Saturday, May 2, 2026 &nbsp;·&nbsp; 6:30 – 9:30 PM</div>
  <br/>
  <div class="hero-venue">The Funwoody Courtyard &nbsp;·&nbsp; 5521 Chamblee Dunwoody Road</div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">Attending</div></div>
  <div class="stat"><div class="stat-n" id="sHead">—</div><div class="stat-l">Headcount</div></div>
  <div class="stat"><div class="stat-n" id="sPaid">—</div><div class="stat-l">Paid</div></div>
</div>

<div class="body">
  <div class="controls">
    <input class="search" type="text" placeholder="Search by name…" oninput="render(this.value)" id="searchInput" />
    <button class="refresh" onclick="load()">↻ Refresh</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-paid"></div>paid</div>
    <div class="legend-item"><div class="legend-dot dot-unpaid"></div>unpaid</div>
  </div>

  <div class="list" id="list"><div class="empty">Loading…</div></div>

  <div class="footer">
    Live from registration &nbsp;·&nbsp; <a onclick="load()">↻ refresh</a> &nbsp;·&nbsp; <span id="lastLoad">—</span>
  </div>
</div>

<script>
const SHEET = '1xwBi3n92z6VU1jSfPYEo8JOJ1zkdlCtc-GTDWtwhZDc';
let people = [];

async function load() {
  try {
    const r = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:json&t=${Date.now()}`);
    const t = await r.text();
    const json = JSON.parse(t.match(/setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    people = json.table.rows
      .filter(r => r.c[2]?.v)
      .map(r => ({
        first: r.c[2]?.v || '',
        last:  r.c[3]?.v || '',
        plus:  (r.c[4]?.v || '').toLowerCase().includes('yes'),
        guest: r.c[5]?.v || '',
        paid:  (r.c[9]?.v || '').toLowerCase() === 'yes'
      }))
      .sort((a, b) => a.last.localeCompare(b.last));

    const withGuest = people.filter(p => p.plus).length;
    document.getElementById('sTotal').textContent = people.length;
    document.getElementById('sHead').textContent = people.length + withGuest;
    document.getElementById('sPaid').textContent = people.filter(p => p.paid).length;
    document.getElementById('lastLoad').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    render(document.getElementById('searchInput').value);
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="empty">Could not load — ensure the sheet is shared as "Anyone with the link can view."</div>';
  }
}

function render(q) {
  const f = q
    ? people.filter(p =>
        (p.first+' '+p.last).toLowerCase().includes(q.toLowerCase()) ||
        (p.guest||'').toLowerCase().includes(q.toLowerCase()))
    : people;

  if (!f.length) { document.getElementById('list').innerHTML = '<div class="empty">No matches found.</div>'; return; }

  document.getElementById('list').innerHTML = f.map((p, i) => `
    <div class="entry ${p.paid ? 'paid' : 'unpaid'}" style="animation-delay:${Math.min(i*0.025,0.5)}s">
      <span class="entry-num">${!q ? i+1 : ''}</span>
      <div class="entry-body">
        <div class="entry-name">${p.first} ${p.last}</div>
        ${p.plus ? `<div class="entry-guest">with ${p.guest || 'guest'}</div>` : ''}
      </div>
      <div class="entry-dot"></div>
    </div>
  `).join('');
}

load();
</script>
</body>
</html>
