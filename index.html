<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DHS Class of 2006 — 20th Reunion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0d1b3e;
    --navy-mid:   #162352;
    --navy-light: #1e2f6a;
    --red:        #b01c2e;
    --red-mid:    #c8102e;
    --red-light:  #e8192e;
    --white:      #ffffff;
    --off-white:  #f4f6fa;
    --silver:     #e8ecf4;
    --rule:       #d0d8e8;
    --ink:        #0d1b3e;
    --ink-mid:    #3a4a6a;
    --ink-light:  #7a8aaa;
    --ink-faint:  #b0baca;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: var(--navy);
    text-align: center;
    padding: 2.75rem 1.5rem 0;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(-55deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
    pointer-events: none;
  }

  /* red accent bar top */
  .hero-top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--red-mid);
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 1.25rem;
  }

  .hero-number-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 0.25rem;
  }

  .hero-class {
    position: absolute;
    top: -0.08em;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: clamp(17px, 3.5vw, 23px);
    font-weight: 400;
    color: var(--ink-faint);
    white-space: nowrap;
    letter-spacing: 0.06em;
  }

  .hero-number {
    font-family: 'Cinzel', serif;
    font-size: clamp(80px, 17vw, 120px);
    font-weight: 600;
    line-height: 0.88;
    color: var(--white);
    letter-spacing: -0.02em;
  }

  .hero-reunion {
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 2vw, 14px);
    font-weight: 600;
    letter-spacing: 0.45em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-top: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .red-rule {
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 260px;
    margin: 0 auto 1.25rem;
  }
  .red-rule-line    { flex: 1; height: 1px; background: var(--red-mid); opacity: 0.5; }
  .red-rule-diamond { width: 5px; height: 5px; background: var(--red-mid); transform: rotate(45deg); flex-shrink: 0; }

  .hero-date {
    display: inline-block;
    background: var(--red-mid);
    color: var(--white);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 6px 20px;
    border-radius: 2px;
    margin-bottom: 0.65rem;
  }

  .hero-venue {
    font-size: 12px;
    font-weight: 300;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    margin-bottom: 2.25rem;
  }

  .hero-stripe {
    display: flex;
    height: 5px;
  }
  .stripe-red   { flex: 2; background: var(--red-mid); }
  .stripe-white { flex: 1; background: var(--white); }
  .stripe-navy  { flex: 2; background: var(--navy-mid); }

  /* ── STATS ── */
  .stats-bar {
    background: var(--white);
    display: flex;
    border-bottom: 1px solid var(--rule);
  }

  .stat {
    flex: 1;
    padding: 1.1rem 0;
    text-align: center;
    border-right: 1px solid var(--rule);
  }
  .stat:last-child { border-right: none; }

  .stat-n {
    font-family: 'Cinzel', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1;
  }
  #sPaid { font-size: 21px; }

  .stat-l {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 4px;
  }

  /* ── BODY ── */
  .body {
    max-width: 600px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 4rem;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .legend {
    display: flex;
    gap: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--ink-light);
    letter-spacing: 0.04em;
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-paid   { background: var(--navy); }
  .dot-unpaid { background: transparent; border: 1.5px solid var(--ink-faint); }

  .refresh {
    padding: 7px 13px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    background: var(--white);
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .refresh:hover { background: var(--silver); border-color: var(--navy); color: var(--navy); }

  /* ── SCROLL LIST ── */
  .scroll-outer {
    overflow: hidden;
    position: relative;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: var(--white);
    height: 420px;
  }

  .scroll-outer::before,
  .scroll-outer::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 64px;
    z-index: 2;
    pointer-events: none;
  }
  .scroll-outer::before { top: 0;    background: linear-gradient(to bottom, var(--white) 15%, transparent); }
  .scroll-outer::after  { bottom: 0; background: linear-gradient(to top,   var(--white) 15%, transparent); }

  .scroll-outer:hover .list { animation-play-state: paused; }

  .list {
    display: flex;
    flex-direction: column;
    animation: scrollUp 30s linear infinite;
  }

  @keyframes scrollUp {
    from { transform: translateY(0); }
    to   { transform: translateY(-50%); }
  }

  .entry {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    gap: 12px;
    flex-shrink: 0;
  }

  .entry-body { flex: 1; min-width: 0; }

  .entry-name {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.3;
  }

  .entry-guest {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    font-style: italic;
    margin-top: 2px;
  }

  .entry-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* paid */
  .paid .entry-name  { color: var(--navy); }
  .paid .entry-guest { color: var(--ink-mid); }
  .paid .entry-dot   { background: var(--navy); }

  /* unpaid */
  .unpaid .entry-name  { color: var(--ink-faint); }
  .unpaid .entry-guest { color: var(--ink-faint); opacity: 0.75; }
  .unpaid .entry-dot   { background: transparent; border: 1.5px solid var(--ink-faint); }

  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--ink-light);
    font-size: 14px;
    font-weight: 300;
  }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 6px;
    font-style: italic;
  }

  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 11px;
    color: var(--ink-faint);
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .footer a { color: var(--red); text-decoration: none; cursor: pointer; }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    .hero { padding: 2rem 1rem 0; }
    .body { padding: 1.25rem 1rem 3rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top-bar"></div>
  <div class="eyebrow">Dunwoody High School &nbsp;·&nbsp; Wildcats</div>
  <div class="hero-number-wrap">
    <div class="hero-class">Class of</div>
    <div class="hero-number">06</div>
  </div>
  <div class="hero-reunion">20 Year Reunion</div>
  <div class="red-rule">
    <div class="red-rule-line"></div>
    <div class="red-rule-diamond"></div>
    <div class="red-rule-line"></div>
  </div>
  <div class="hero-date">Saturday, May 2, 2026 &nbsp;·&nbsp; 6:30 – 9:30 PM</div><br/>
  <div class="hero-venue">The Funwoody Courtyard &nbsp;·&nbsp; 5521 Chamblee Dunwoody Road</div>
  <div class="hero-stripe">
    <div class="stripe-red"></div>
    <div class="stripe-white"></div>
    <div class="stripe-navy"></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">Attending</div></div>
  <div class="stat"><div class="stat-n" id="sHead">—</div><div class="stat-l">Headcount</div></div>
  <div class="stat"><div class="stat-n" id="sPaid">—</div><div class="stat-l">Paid</div></div>
</div>

<div class="body">
  <div class="list-header">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot dot-paid"></div>paid</div>
      <div class="legend-item"><div class="legend-dot dot-unpaid"></div>unpaid</div>
    </div>
    <button class="refresh" onclick="load()">↻ Refresh</button>
  </div>

  <div class="scroll-outer">
    <div class="list" id="list"><div class="empty">Loading…</div></div>
  </div>
  <div class="hint">hover to pause</div>

  <div class="footer">
    Live from registration &nbsp;·&nbsp; <a onclick="load()">↻ refresh</a> &nbsp;·&nbsp; <span id="lastLoad">—</span>
  </div>
</div>

<script>
const SHEET = '1xwBi3n92z6VU1jSfPYEo8JOJ1zkdlCtc-GTDWtwhZDc';
let people = [];

async function load() {
  try {
    const r = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:json&t=${Date.now()}`);
    const t = await r.text();
    const json = JSON.parse(t.match(/setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    people = json.table.rows
      .filter(r => r.c[2]?.v)
      .map(r => ({
        first: r.c[2]?.v || '',
        last:  r.c[3]?.v || '',
        plus:  (r.c[4]?.v || '').toLowerCase().includes('yes'),
        guest: r.c[5]?.v || '',
        paid:  (r.c[9]?.v || '').toLowerCase() === 'yes'
      }))
      .sort((a, b) => a.last.localeCompare(b.last));

    const withGuest = people.filter(p => p.plus).length;
    const headcount = people.length + withGuest;
    const paid = people.filter(p => p.paid).reduce((sum, p) => sum + 1 + (p.plus ? 1 : 0), 0);

    document.getElementById('sTotal').textContent = people.length;
    document.getElementById('sHead').textContent = headcount;
    document.getElementById('sPaid').textContent = paid + ' / ' + headcount;
    document.getElementById('lastLoad').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    renderScroll();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="empty">Could not load — ensure the sheet is shared as "Anyone with the link can view."</div>';
  }
}

function renderScroll() {
  if (!people.length) return;
  const entryHTML = people.map(p => `
    <div class="entry ${p.paid ? 'paid' : 'unpaid'}">
      <div class="entry-body">
        <div class="entry-name">${p.first} ${p.last}</div>
        ${p.plus ? `<div class="entry-guest">with ${p.guest || 'guest'}</div>` : ''}
      </div>
      <div class="entry-dot"></div>
    </div>
  `).join('');

  const list = document.getElementById('list');
  list.innerHTML = entryHTML + entryHTML;
  const duration = Math.max(16, people.length * 2.5);
  list.style.animationDuration = duration + 's';
}

load();
</script>
</body>
</html>
